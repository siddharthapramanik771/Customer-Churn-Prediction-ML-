version: '3.8'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    depends_on:
      - api
    ports:
      - "8501:8501"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.1
    command: mlflow ui --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
